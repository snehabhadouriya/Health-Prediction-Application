<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Edit Patient</h2>
        <form method="POST">
            <input type="text"
                   name="Full_name"
                   value="{{ patient[1] }}"
                   class="form-control mb-3">

            <input type="date"
                   name="dob"
                   value="{{ patient[2] }}"
                   class="form-control mb-3">

            <input type="email"
                   name="email"
                   value="{{ patient[3] }}"
                   class="form-control mb-3">
                   
            <input type="number"
                   step="0.01"
                   name="Glucose"
                   value="{{ patient[4] }}"
                   class="form-control mb-3">

            <input type="number"
                   step="0.01"
                   name="Haemoglobin"
                   value="{{ patient[5] }}"
                   class="form-control mb-3">

            <input type="number"
                   step="0.01"
                   name="Cholesterol"
                   value="{{ patient[6] }}"
                   class="form-control mb-3">
            <button class="btn btn-primary">Update Patient</button>
        </form>
    </div>
</body>
</html>
