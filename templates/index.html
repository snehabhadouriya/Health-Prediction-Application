<!DOCTYPE html>
<html>
    <head>
        <title>Health Prediction APP</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
        <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

        <style>
        body{
            background-image:
            linear-gradient(
                rgba(0,0,0,0.5),
                rgba(0,0,0,0.5)
            ),
            url('/static/health_image.jpg');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        .card
        {
            background:(255,255,255,0.95);
            border-radius: 20px;
            border:none
            box-shadow 0 10px 30px rgba(0,0,0,0.3);
        }
        .title
        {
            color: #0d6efd;
            font-weight: bold;

        }
         .btn-custom{
            width:100%;
            padding:12px;
            font-size:18px;
            border-radius:10px;
        }

        </style>

    </head>
    <body>
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card p-4">
                        <h2 class="text-center mb-4 title">
                            <i class="bi bi-heart-pulse-fill"></i>
                            Health Prediction Application
                        </h2>
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-danger text-center">
                                        {{ message }}
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="post" action="/save">
                            <div class="mb-3">
                                <label class="form-label">Full Name:</label>
                                <input type="text"
                                       name="Full_name"
                                       class="form-control"
                                       required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Date Of Birth</label>
                                <input type="date"
                                       name="dob"
                                       max="{{ today }}"
                                       class="form-control"
                                       required>
                            </div>
                            
                            <div class="mb-3">
                                 <label class="form-label">Email Address:</label>
                                 <input type="email"
                                        name="email"
                                        class="form-control"
                                        required>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Glucose:</label>
                                    <input type="number"
                                           step="0.01"
                                           name="Glucose"
                                           class="form-control"
                                           required>
                                </div>
                                
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Haemoglobin:</label>
                                    <input type="number"
                                           step="0.01"
                                           name="Haemoglobin"
                                           class="form-control"
                                           required>
                                </div>
                                
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Cholesterol:</label>
                                    <input type="number"
                                           step="0.01"
                                           name="Cholesterol"
                                           class="form-control"
                                           required>
                                </div>
                            </div>
                            
                            <button type="Submit"
                                     class="btn btn-primary btn-custom">
                                     Predict & Save
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
